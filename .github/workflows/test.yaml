name: NATS CLI Testing

permissions:
  contents: read

defaults:
  run:
    shell: bash

on: [push, pull_request]

jobs:
  lint:
    name: Running linting (ubuntu-latest/1.24)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install linting tools
        shell: bash --noprofile --norc -x -eo pipefail {0}
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/client9/misspell/cmd/misspell@latest

      - name: Lint
        shell: bash --noprofile --norc -x -eo pipefail {0}
        run: |
          PATH=$PATH:$GOPATH/bin
          GO_LIST=$(go list ./... | grep -F -e asciigraph -v)
          $(exit $(go fmt $GO_LIST | wc -l))
          go vet -composites=false $GO_LIST
          find . -type f -name "*.go" | grep -F -e asciigraph -v | xargs misspell -error -locale US
          staticcheck -f stylish $GO_LIST

  test:
    name: Running tests (${{ matrix.os }}/${{matrix.go}})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        go: [ "1.25", "1.26" ]
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{matrix.go}}

      - name: Build
        run: |
          cd nats
          go build

      - name: Run Linux tests
        if: startsWith(runner.os, 'Linux')
        shell: bash --noprofile --norc -x -eo pipefail {0}
        run: |
          set -e
          go list ./... | grep -F -e asciigraph -v | xargs go test -v --failfast -p=1
          set +e

      - name: Run Windows tests
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-LoggedCommand {
            param([string]$command)
            Invoke-Expression $command
            if ($LASTEXITCODE -ne 0) {
              Write-Error "x Command failed: $command"
              exit $LASTEXITCODE
            }
          }

          go list ./... | ForEach-Object{
            if ($_ -notmatch 'asciigraph') {
              Invoke-LoggedCommand "go test -v --failfast -p=1 $_"
            }
          }

  fips:
    name: Running FIPS tests (ubuntu-latest/${{matrix.go}})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        go: [ "1.25", "1.26" ]

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{matrix.go}}

      - name: Build
        run: |
          cd nats
          go build

      - name: Run FIPS tests
        shell: bash --noprofile --norc -x -eo pipefail {0}
        env:
          CI: "true"
        run: |
          cd nats/tests
          go test -tags fips -v --failfast -p=1 -run FIPS .
